baseURL: https://mattiag.ch/
locale: de-CH
title: Mattia G
theme: ["github.com/adityatelange/hugo-PaperMod"]

enableInlineShortcodes: true

params:
    DateFormat: "January 2, 2006"
    ShowReadingTime: false
    ShowShareButtons: false
    ShowPostNavLinks: false
    ShowBreadCrumbs: true
    ShowCodeCopyButtons: true
    ShowWordCount: false
    ShowRssButtonInSectionTermList: false
    UseHugoToc: true
    disableSpecial1stPost: true
    disableScrollToTop: false
    comments: false
    hidemeta: false
    hideSummary: false
    showtoc: false
    tocopen: false

    profileMode:
        enabled: true
        title: "Mattia G"
        subtitle: "🥅 Floorball | 👨‍💻 Coding | 🏃 Running | 🛠️ 3D Printing | 🚴 Cycling"
        buttons:
            - name: Posts
              url: "/posts"
            - name: SwissWaterTemps
              url: "https://swt.mattiag.ch/"

    socialIcons:
        - name: "github"
          url: "https://github.com/999mattia/"
        - name: "strava"
          url: "https://strava.com/athletes/139113253/"

    fuseOpts:
        isCaseSensitive: false
        shouldSort: true
        location: 0
        distance: 1000
        threshold: 0.4
        minMatchCharLength: 2
        # limit: 10 # refer: https://www.fusejs.io/api/methods.html#search
        keys: ["title", "permalink", "summary", "content"]

menu:
    main:
        - identifier: Posts
          name: Posts
          url: /posts/
          weight: 10
        - identifier: SwissWaterTemps
          name: SWT
          url: https://swt.mattiag.ch/
          weight: 20
        - identifier: Search
          name: 🔍
          url: /search/
          weight: 30

caches:
    images:
        dir: :cacheDir/images

module:
    imports:
        - path: github.com/adityatelange/hugo-PaperMod
        - path: github.com/ravelzh/hugo-gpx-module

outputs:
    home:
        - HTML
        - RSS
        - JSON # necessary for search
